<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Predictor</title>
    <link rel="stylesheet" href="styles.css">
    <script defer>
(function(){
  var B="http://localhost:8001",I=39;
  var s=sessionStorage.getItem("_awas_sid");
  if(!s){s=crypto.randomUUID?crypto.randomUUID():(Math.random().toString(36).slice(2)+Date.now().toString(36));sessionStorage.setItem("_awas_sid",s)}
  function send(d){d.bid=I;d.sid=s;var b=JSON.stringify(d);if(navigator.sendBeacon){navigator.sendBeacon(B+"/api/collect",new Blob([b],{type:"application/json"}))}else{fetch(B+"/api/collect",{method:"POST",headers:{"Content-Type":"application/json"},body:b,keepalive:true}).catch(function(){})}}
  send({t:"pv",url:location.href,ref:document.referrer||"",sw:screen.width});
  window.addEventListener("load",function(){setTimeout(function(){var n=performance.getEntriesByType("navigation")[0];if(n)send({t:"perf",url:location.href,lt:Math.round(n.loadEventEnd),ttfb:Math.round(n.responseStart)});},200)});
  window.addEventListener("error",function(e){send({t:"err",url:location.href,em:e.message||"",es:(e.filename||"")+":"+(e.lineno||0)})});
  window.addEventListener("unhandledrejection",function(e){send({t:"err",url:location.href,em:String(e.reason||"promise_error")})});
  setInterval(function(){send({t:"hb"})},30000);
})();
</script>
</head>
<body>
    <div class="container">
        <h1>Weather Predictor</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name">
            <button onclick="getWeather()">Search</button>
        </div>
        
        <div class="weather-container">
            <div class="current-weather">
                <h2>Current Weather</h2>
                <div class="weather-info">
                    <div class="info-item">
                        <span class="label">Temperature:</span>
                        <span id="currentTemp">--°C</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Feels Like:</span>
                        <span id="feelsLike">--°C</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Min Temperature:</span>
                        <span id="minTemp">--°C</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Max Temperature:</span>
                        <span id="maxTemp">--°C</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Humidity:</span>
                        <span id="humidity">--%</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Weather:</span>
                        <span id="weatherDesc">--</span>
                    </div>
                </div>
            </div>

            <div class="future-weather">
                <h2>Future Predictions</h2>
                <div id="futurePredictions" class="predictions-grid">
                    <!-- Future predictions will be inserted here -->
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
